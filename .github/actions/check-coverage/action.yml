name: Check .NET Test Coverage
description: Validates Cobertura line coverage and optionally publishes a badge

inputs:
  min-line-coverage:
    description: Minimum required line coverage percentage
    required: false
    default: "80"
  coverage-file-pattern:
    description: Coverage filename to search for
    required: false
    default: "coverage.cobertura.xml"
  repository:
    description: GitHub repository (e.g. org/repo)
    required: true
  branch:
    description: Git branch/ref name
    required: true
  badge-key-scope:
    description: Optional path segment appended to repository for badge key
    required: false
    default: ""
  badge-service-api-key:
    description: API key for badge service. If empty, badge publish is skipped.
    required: false
    default: ""

outputs:
  coverage:
    description: Rounded line coverage percentage
    value: ${{ steps.check.outputs.coverage }}

runs:
  using: composite
  steps:
    - id: check
      shell: bash
      run: |
        set -euo pipefail

        file="$(find . -name "${{ inputs.coverage-file-pattern }}" 2>/dev/null | head -n 1)"
        if [ -z "$file" ]; then
          echo "Coverage file not found: (${{ inputs.coverage-file-pattern }})"
          exit 1
        fi

        lineRatePct=$(python3 <<EOF
        import xml.etree.ElementTree as ET
        tree = ET.parse('$file')
        root = tree.getroot()
        # Cobertura uses 'line-rate' attribute (e.g., 0.85)
        rate = float(root.attrib['line-rate'])
        print(round(rate * 100))
        EOF
        )
        minCoverage="${{ inputs.min-line-coverage }}"

        if [ "$lineRatePct" -lt "$minCoverage" ]; then
          echo "## Test coverage failed :x:" >> "$GITHUB_STEP_SUMMARY"
          echo "**Line coverage:** ${lineRatePct}% | **Required:** ${minCoverage}%" >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi

        echo "## Test coverage passed :white_check_mark:" >> "$GITHUB_STEP_SUMMARY"
        echo "**Line coverage:** ${lineRatePct}% (required: ${minCoverage}%)" >> "$GITHUB_STEP_SUMMARY"
        echo "coverage=$lineRatePct" >> "$GITHUB_OUTPUT"

        apiKey="${{ inputs.badge-service-api-key }}"
        if [ -z "$apiKey" ]; then
          echo "Badge API key not provided, skipping badge publish."
          exit 0
        fi

        badgeKey="${{ inputs.repository }}|${{ inputs.branch }}"
        if [ -n "${{ inputs.badge-key-scope }}" ]; then
          badgeKey="${{ inputs.repository }}/${{ inputs.badge-key-scope }}|${{ inputs.branch }}"
        fi

        json="$(jq -nc \
          --arg key "$badgeKey" \
          --arg displayName "Coverage" \
          --arg value "${lineRatePct}%" \
          '{key: $key, displayName: $displayName, value: $value}')"

        curl --fail --silent --show-error \
          -X POST \
          -H "Content-Type: application/json" \
          -H "x-api-key: $apiKey" \
          -d "$json" \
          "https://app-github-custom-badges.azurewebsites.net/Badge"
