name: .NET Setup & Restore
description: Checkout, setup .NET SDK, and restore dependencies

inputs:
  dotnet-version:
    required: false
    default: '8.0.x'
    description: The .NET SDK version to use

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: ${{ inputs.dotnet-version }}
        cache: true
        cache-dependency-path: '**/packages.lock.json'

    - name: Restore
      shell: bash
      run: dotnet restore
