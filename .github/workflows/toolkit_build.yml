name: Toolkit Build

on:
  workflow_call:
    inputs:
      working_directory:
        required: false
        type: string
        default: '.'
        description: 'Working directory for the build, relative to repository root, e.g. Frends.Common.Toolkit'
      project_directory:
        required: true
        type: string
        description: 'Directory of the project to build, relative to working directory, e.g. Frends.Common.Toolkit (so from root it would be Frends.Common.Toolkit/Frends.Common.Toolkit)'
      dotnet_version:
        required: false
        type: string
        default: '8.0.x'
        description: 'Version of .NET SDK to use, e.g. 6.0.x, 8.0.x'

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Setup
        uses: ./.github/actions/dotnet-setup
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Lint
        run: dotnet format --no-restore --verify-no-changes

  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Setup
        uses: ./.github/actions/dotnet-setup
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Pack
        run: dotnet pack --no-restore --no-build --configuration Release

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: nuget-packages
          path: '${{ inputs.project_directory }}/bin/Release/*.nupkg'
          retention-days: 7

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Setup
        uses: ./.github/actions/dotnet-setup
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --collect:"XPlat Code Coverage"

      - name: Test coverage
        env:
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          BADGE_SERVICE_API_KEY: ${{ secrets.BADGE_SERVICE_API_KEY }}
        run: |
          file=$(find . -name 'coverage.cobertura.xml' 2>/dev/null | head -n 1)
          lineRatePct=$(python3 -c "
            import xml.etree.ElementTree as ET
            root = ET.parse('$file').getroot()
            print(round(float(root.attrib['line-rate']) * 100))
          ")
          if [ $lineRatePct -lt 80 ]; then
            echo "## Test coverage failed :x:" >> $GITHUB_STEP_SUMMARY
            echo "**Line coverage:** $lineRatePct% | **Required:** 80%" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "## Test coverage passed :white_check_mark:" >> $GITHUB_STEP_SUMMARY
            echo "**Line coverage:** $lineRatePct%" >> $GITHUB_STEP_SUMMARY
            echo "coverage=$lineRatePct" >> $GITHUB_OUTPUT
          fi
          badgeKey="$REPOSITORY/${{ inputs.project_directory }}|$BRANCH"
          json=$(jq -nc \
            --arg key "$badgeKey" \
            --arg displayName "Coverage" \
            --arg value "$lineRatePct%" \
            '{key: $key, displayName: $displayName, value: $value}')
          curl \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-api-key: $BADGE_SERVICE_API_KEY" \
            -d "$json" \
            https://app-github-custom-badges.azurewebsites.net/Badge
