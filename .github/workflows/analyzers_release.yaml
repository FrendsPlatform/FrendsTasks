name: Analyzers Release

on:
  push:
    branches:
      - main
    paths:
      - 'FrendsTaskAnalyzers/**'
  workflow_dispatch:

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_VERSION: '9.0.x'
  BUILD_CONFIGURATION: 'Release'
  NUGET_SOURCE_URL: https://pkgs.dev.azure.com/frends-platform/frends-tasks/_packaging/main/nuget/v3/index.json

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      tag: ${{ steps.get-version.outputs.tag }}
    defaults:
      run:
        working-directory: 'FrendsTaskAnalyzers/'
    steps:
      - name: Install xmlstarlet
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt update
          sudo apt install --no-install-recommends -y xmlstarlet

      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - id: get-version
        name: Get project version
        run: |
          VERSION=$(xmlstarlet sel -t -v "//Version" FrendsTaskAnalyzers/FrendsTaskAnalyzers.csproj 2>/dev/null || echo "1.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        run: |
          if git rev-parse "refs/tags/${{ steps.get-version.outputs.tag }}" >/dev/null 2>&1; then
            echo "## Release failed :x:" >> $GITHUB_STEP_SUMMARY
            echo "Duplicate tag ${{ steps.get-version.outputs.tag }} already exists." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: 'FrendsTaskAnalyzers/**/*.csproj'

      - name: Restore dependencies
        run: dotnet restore --locked-mode

      - name: Build
        run: dotnet build --no-restore --configuration ${{ env.BUILD_CONFIGURATION }}

      - name: Pack
        run: dotnet pack --no-build --configuration ${{ env.BUILD_CONFIGURATION }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: 'release'
          path: |
            FrendsTaskAnalyzers/FrendsTaskAnalyzers/bin/${{ env.BUILD_CONFIGURATION }}/**/*.dll
            FrendsTaskAnalyzers/FrendsTaskAnalyzers/bin/${{ env.BUILD_CONFIGURATION }}/**/*.nupkg
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          name: 'release'

      - name: Create release
        uses: softprops/action-gh-release@v2.2.2
        with:
          draft: false
          prerelease: false
          files: |
            **/*.dll
            **/*.nupkg
          name: FrendsTaskAnalyzers v${{ needs.build.outputs.version }}
          tag_name: ${{ needs.build.outputs.tag }}
          fail_on_unmatched_files: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish NuGet package
        run: |
          dotnet nuget push **/*.nupkg \
            --api-key ${{ secrets.feed_api_key }} \
            --source ${{ env.NUGET_SOURCE_URL }}
