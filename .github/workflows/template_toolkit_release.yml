name: Release Toolkit Template
permissions:
  contents: read

on:
  push:
    paths:
      - 'FrendsToolkitTemplate/**'
      - '.github/workflows/*toolkit*.yml'

env:
  azure_artifacts_feed_url: ${{ github.ref_name == 'main' && 'https://pkgs.dev.azure.com/frends-platform/frends-tasks/_packaging/main/nuget/v3/index.json' || 'https://pkgs.dev.azure.com/frends-platform/frends-tasks/_packaging/test/nuget/v3/index.json' }}
  nuget_api_key: ${{ github.ref_name == 'main' && secrets.TASKS_FEED_API_KEY || secrets.TASKS_TEST_FEED_API_KEY }}
  skip_duplicate: ${{ github.ref_name != 'main' }}

jobs:
  build:
    name: Build on ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup
        uses: ./.github/actions/dotnet-pack
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          working-directory: ${{ inputs.project-directory }}

      - name: Test
        run: dotnet test --no-build --configuration Release --collect:"XPlat Code Coverage"
        working-directory: ${{ inputs.project-directory }}/..

      - name: Test coverage
        id: code_coverage
        uses: ./.github/actions/check-coverage
        with:
          min-line-coverage: ${{ inputs.min-coverage }}
          repository: ${{ github.repository }}
          branch: ${{ github.ref_name }}
          badge-key-scope: ${{ inputs.project-directory }}
          badge-service-api-key: ${{ secrets.BADGE_SERVICE_API_KEY }}

      - name: Push NuGet package(s)
        run: |
          ARGS="--api-key ${{ env.nuget_api_key }} --source ${{ env.azure_artifacts_feed_url }}"
          if [ "${{ env.skip_duplicate }}" = "true" ]; then
            ARGS="$ARGS --skip-duplicate"
          fi
          dotnet nuget push bin/Release/frendstasktemplate.*.nupkg $ARGS
