name: Common Toolkit Release

on:
  push:
    branches:
      - main
    paths:
      - 'Frends.Common.Toolkit/**'
  workflow_dispatch:

jobs:
  build:
    uses: FrendsPlatform/FrendsTasks/.github/workflows/toolkit_release.yml@main
    with:
      working-directory: 'Frends.Common.Toolkit'
      project-directory: 'Frends.Common.Toolkit'
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
