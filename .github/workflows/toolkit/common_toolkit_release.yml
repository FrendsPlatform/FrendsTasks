name: Common Toolkit Release

on:
  push:
    branches:
      - main
    paths:
      - 'Frends.Common.Toolkit/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_DIRECTORY: 'Frends.Common.Toolkit/Frends.Common.Toolkit'

defaults:
  run:
    working-directory: 'Frends.Common.Toolkit'

jobs:
  release:
    name: Release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Setup
        uses: .github/actions/dotnet-setup

      - id: project_version
        name: Extract project version
        run: |
          version=$(dotnet msbuild "$GITHUB_WORKSPACE/Frends.Common.Toolkit/Frends.Common.Toolkit/Frends.Common.Toolkit.csproj" -nologo -getProperty:Version)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          - name: Build
            run: dotnet build --no-restore --configuration Release

      - name: Pack
        run: dotnet pack --no-restore --no-build --configuration Release

      - name: Push NuGet package
        env:
          VERSION: ${{ steps.project_version.outputs.version }}
          NUGET_AUTH_TOKEN: ${{ secrets.NUGETORG_API_KEY }}
        run: |
          dotnet nuget push Frends.Common.Toolkit/bin/Release/*.$VERSION.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key $NUGET_AUTH_TOKEN

      - name: Create release
        uses: softprops/action-gh-release@v2.6.1
        with:
          draft: false
          prerelease: false
          files: |
            ${{ env.PROJECT_DIRECTORY }}/bin/Release/*.${{ steps.project_version.outputs.version }}.nupkg
          name: Frends.Common.Toolkit v${{ steps.project_version.outputs.version }}
          tag_name: common-toolkit-v${{ steps.project_version.outputs.version }}
          fail_on_unmatched_files: true
