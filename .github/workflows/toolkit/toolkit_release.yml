name: Common Toolkit Release

on:
  workflow_call:
    inputs:
      working_directory:
        required: false
        type: string
        default: '.'
        description: 'Working directory for the build, relative to repository root, e.g. Frends.Common.Toolkit'
      project_directory:
        required: true
        type: string
        description: 'Directory of the project to build, relative to working directory, e.g. Frends.Common.Toolkit (so from root it would be Frends.Common.Toolkit/Frends.Common.Toolkit)'
      dotnet_version:
        required: false
        type: string
        default: '8.0.x'
        description: 'Version of .NET SDK to use, e.g. 6.0.x, 8.0.x'

permissions:
  contents: read

defaults:
  run:
    working-directory: ${{ inputs.working_directory }}

jobs:
  release:
    name: Release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Setup
        uses: .github/actions/dotnet-setup
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - id: project_version
        name: Extract project version
        run: |
          version=$(dotnet msbuild ${{inputs.project_directory}}/*.csproj --getProperty:Version -nologo)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Pack
        run: dotnet pack --no-restore --no-build --configuration Release

      - name: Push NuGet package
        run: |
          dotnet nuget push ${{inputs.project_directory}}/bin/Release/*.${{ steps.project_version.outputs.version }}.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ secrets.NUGETORG_API_KEY }}

      - name: Create release
        uses: softprops/action-gh-release@v2.6.1
        with:
          draft: false
          prerelease: false
          files: |
            ${{ inputs.project_directory }}/bin/Release/*.${{ steps.project_version.outputs.version }}.nupkg
          name: '${{inputs.project_directory}} v${{ steps.project_version.outputs.version }}'
          tag_name: ${{inputs.project_directory}}-v${{ steps.project_version.outputs.version }}
          fail_on_unmatched_files: true
