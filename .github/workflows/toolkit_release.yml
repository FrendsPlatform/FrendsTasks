name: Toolkit Release

on:
  workflow_call:
    secrets:
      NUGETORG_API_KEY:
        required: true
        description: 'API key for NuGet.org to publish the package'
    inputs:
      working-directory:
        required: false
        type: string
        default: '.'
        description: 'Working directory for the build, relative to repository root, e.g. Frends.Common.Toolkit'
      project-directory:
        required: true
        type: string
        description: 'Directory of the project to build, relative to working directory, e.g. Frends.Common.Toolkit (so from root it would be Frends.Common.Toolkit/Frends.Common.Toolkit)'
      dotnet-version:
        required: false
        type: string
        default: '8.0.x'
        description: 'Version of .NET SDK to use, e.g. 6.0.x, 8.0.x'

permissions:
  contents: read

jobs:
  Release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Setup
        uses: FrendsPlatform/FrendsTasks/.github/actions/dotnet-setup@fspw-732-CommonLib-PoC
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          working-directory: ${{ inputs.working-directory }}

      - id: project_version
        name: Extract project version
        run: |
          version=$(dotnet msbuild ./${{inputs.project-directory}}/*.csproj --getProperty:Version -nologo)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Pack
        run: dotnet pack --no-restore --no-build --configuration Release

      - name: Push NuGet package
        run: |
          dotnet nuget push ./${{inputs.project-directory}}/bin/Release/*.${{ steps.project_version.outputs.version }}.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ secrets.NUGETORG_API_KEY }}

      - name: Create release
        uses: softprops/action-gh-release@v2.6.1
        with:
          draft: false
          prerelease: false
          files: |
            ./${{ inputs.project-directory }}/bin/Release/*.${{ steps.project_version.outputs.version }}.nupkg
          name: '${{inputs.project-directory}} v${{ steps.project_version.outputs.version }}'
          tag_name: ${{inputs.project-directory}}-v${{ steps.project_version.outputs.version }}
          fail_on_unmatched_files: true
